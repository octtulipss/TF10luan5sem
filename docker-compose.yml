services:

  #NODE WEB
  nodeweb-container:
    build:
      context: .
      dockerfile: docker/node-web/Dockerfile.dev
    env_file: 
      - .env
      - .env.docker
    volumes:
      - .:/app
      - nodemodules-volume:/app/node_modules
    depends_on:
      - postgres-container
    environment:
      POSTGRES_HOST: postgres_host
      POSTGRES_PORT: 5432
    restart: unless-stopped
    networks:
      app-network:
        aliases:
            - nodeweb_host

  #NGINX
  nginx-container:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/public
    depends_on:
      - nodeweb-container
    networks:
      - app-network

  #POSTGRES
  postgres-container:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata-volume:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      app-network:
        aliases:
          - postgres_host

networks:
  app-network:
    driver: bridge

volumes:
  nodemodules-volume:
  pgdata-volume: